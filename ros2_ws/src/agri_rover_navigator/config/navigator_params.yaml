navigator:
  ros__parameters:
    # Pure pursuit lookahead distance (metres)
    lookahead_distance: 3.0

    # Waypoint acceptance radius (metres) — overridden per-waypoint if set
    default_acceptance_radius: 0.3

    # Maximum speed (m/s) — maps to PPM throttle
    max_speed: 1.5

    # Minimum speed when turning (m/s)
    min_speed: 0.3


    # Maximum steering angle rate (maps to PPM steering range 1000–2000)
    max_steering: 0.8   # fraction of full deflection

    # Control loop rate (Hz) — match GPS update rate so every fix is acted on
    control_rate: 25.0

    # Stale fix timeout (seconds) — halt if GPS not updated
    gps_timeout: 2.0

    # Heading deadband (degrees) — ignore small heading errors
    heading_deadband: 3.0

    # Stop-and-spin threshold (degrees) — only spin in place when heading
    # error exceeds this. Normal turns use proportional steering while moving.
    # 30° lets the rover handle curves continuously without stopping.
    align_threshold: 30.0
