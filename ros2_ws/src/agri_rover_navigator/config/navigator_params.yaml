navigator:
  ros__parameters:
    # Pure pursuit lookahead distance (metres)
    lookahead_distance: 3.0

    # Waypoint acceptance radius (metres) — overridden per-waypoint if set
    default_acceptance_radius: 0.3

    # Maximum speed (m/s) — maps to PPM throttle
    max_speed: 1.5

    # Minimum speed when turning (m/s)
    min_speed: 0.3


    # Maximum steering angle rate (maps to PPM steering range 1000–2000)
    max_steering: 0.8   # fraction of full deflection

    # Control loop rate (Hz) — match GPS update rate so every fix is acted on
    control_rate: 25.0

    # Stale fix timeout (seconds) — halt if GPS not updated
    gps_timeout: 2.0

    # Heading deadband (degrees) — ignore small heading errors
    heading_deadband: 3.0

    # Stop-and-spin threshold (degrees) — only spin in place when heading
    # error exceeds this. Normal turns use proportional steering while moving.
    # 30° lets the rover handle curves continuously without stopping.
    align_threshold: 30.0

    # Stanley controller gain — scales cross-track error correction.
    # Higher = more aggressive path hugging; lower = smoother but more drift.
    stanley_k: 1.0

    # Speed softening (m/s) — prevents division by zero at very low speed.
    # Should be ≤ min_speed so it rarely activates.
    stanley_softening: 0.3

    # Pivot-turn parameters
    # pivot_threshold (degrees): turn angle at a waypoint above which the rover
    #   stops and spins in place to the new heading instead of trying to curve.
    #   90° field turns typically need this. Set lower (e.g. 45°) for tighter
    #   course changes; set higher (e.g. 120°) to only pivot on very sharp turns.
    pivot_threshold: 30.0

    # pivot_approach_dist (metres): distance from a pivot waypoint at which the
    #   rover switches from path-lookahead to direct-to-waypoint aiming and begins
    #   slowing to min_speed. Ensures precise arrival at the turn point.
    pivot_approach_dist: 4.0

    # rover_width_m (metres): physical width of the rover.  Half of this is always
    #   enforced as minimum clearance from obstacle edges regardless of obstacle_clearance_m.
    rover_width_m: 1.0

    # obstacle_clearance_m (metres): additional safety buffer added on top of the rover
    #   half-width.  Effective expansion = rover_width_m/2 + obstacle_clearance_m.
    #   e.g. rover 1.0 m wide + 0.5 m buffer → 1.0 m total edge offset.
    obstacle_clearance_m: 0.5

    # ── Control algorithm ──────────────────────────────────────────────────
    # control_algorithm: 'stanley' (default) or 'mpc'
    #   stanley — full-path Stanley lateral controller (heading error + CTE)
    #   mpc     — Model Predictive Control over a receding horizon; requires
    #             scipy (pip install scipy).  Falls back to Stanley if scipy
    #             is not installed.
    control_algorithm: 'mpc'

    # MPC tuning (only active when control_algorithm: 'mpc')
    #   mpc_horizon  — prediction horizon (number of steps).  10 @ 0.2 s = 2 s ahead.
    #   mpc_dt       — seconds between prediction steps.  Keep >= 1/control_rate.
    #   mpc_w_cte    — cross-track error weight.  Higher = tighter path hugging.
    #   mpc_w_heading — heading error weight.  Higher = faster heading correction.
    #   mpc_w_steer  — steering effort weight.  Higher = less aggressive steering.
    #   mpc_w_dsteer — steering rate weight.  Higher = smoother steering transitions.
    #   wheelbase_m  — effective rover wheelbase used in the kinematic prediction
    #                  model.  Tune to match observed turn rate (smaller = tighter).
    mpc_horizon:   10
    mpc_dt:        0.2
    mpc_w_cte:     2.0
    mpc_w_heading: 1.0
    mpc_w_steer:   0.1
    mpc_w_dsteer:  0.05
    wheelbase_m:   0.6
