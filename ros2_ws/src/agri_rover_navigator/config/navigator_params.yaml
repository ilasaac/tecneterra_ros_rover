navigator:
  ros__parameters:
    # Pure pursuit lookahead distance (metres)
    lookahead_distance: 3.0

    # Waypoint acceptance radius (metres) — overridden per-waypoint if set
    default_acceptance_radius: 0.3

    # Maximum speed (m/s) — maps to PPM throttle
    max_speed: 1.5

    # Minimum speed when turning (m/s)
    min_speed: 0.3


    # Maximum steering angle rate (maps to PPM steering range 1000–2000)
    max_steering: 0.8   # fraction of full deflection

    # Control loop rate (Hz) — match GPS update rate so every fix is acted on
    control_rate: 25.0

    # Stale fix timeout (seconds) — halt if GPS not updated
    gps_timeout: 2.0

    # Heading deadband (degrees) — ignore small heading errors
    heading_deadband: 3.0

    # Stop-and-spin threshold (degrees) — only spin in place when heading
    # error exceeds this. Normal turns use proportional steering while moving.
    # 30° lets the rover handle curves continuously without stopping.
    align_threshold: 30.0

    # Stanley controller gain — scales cross-track error correction.
    # Higher = more aggressive path hugging; lower = smoother but more drift.
    stanley_k: 1.0

    # Speed softening (m/s) — prevents division by zero at very low speed.
    # Should be ≤ min_speed so it rarely activates.
    stanley_softening: 0.3

    # min_turn_radius_m (metres): minimum arc radius for corridor headland turns.
    #   Missions with arcs tighter than this are rejected on load.
    min_turn_radius_m: 2.0

    # post_turn_speed (m/s): speed at the first point after a corridor turn arc.
    post_turn_speed: 0.5

    # rover_width_m (metres): physical width of the rover. Used for mission
    #   validation against field boundaries.
    rover_width_m: 1.0

    # ── Motor stiction floors (Stanley output) ─────────────────────────────
    # min_throttle_ppm: hard PPM floor for any forward motion command.
    #   Prevents motor stall when CTE-proportional scaling reduces throttle below
    #   the motor stiction threshold.  E.g. 1550 = 50 µs above neutral.
    min_throttle_ppm: 1550

    # min_steer_ppm_delta: minimum |steer_ppm − 1500| during active turning.
    #   Applied only when |heading_err| > steer_coast_angle, so proportional
    #   control decays to zero near the target and avoids overshoot.
    min_steer_ppm_delta: 150

    # steer_coast_angle: |heading_err| (°) below which the steer floor is NOT
    #   applied.  Lets the rover coast to alignment naturally near target.
    steer_coast_angle: 15.0

    # ── Inter-rover proximity safety ────────────────────────────────────────
    # peer_rover_ns: absolute ROS2 namespace of the other rover ('/rv2' or '/rv1').
    #   Leave empty '' to disable proximity safety in single-rover mode.
    # rover geometry — used to compute bounding-box clearance between the two rovers:
    #   rover_front_corner_dist_m: diagonal distance from the front GPS antenna to each
    #     front corner of the rover body. With 0.5 m half-width: front_ov=sqrt(0.6²-0.5²)≈0.33m.
    #   rover_rear_corner_dist_m: same for rear GPS antenna to each rear corner.
    #     With 0.5 m half-width: rear_ov=sqrt(1.0²-0.5²)≈0.87m.
    #   rover_half_width_m: half the physical rover width (metres).
    # proximity_slow_m:  body clearance (m) below which this rover halves its speed.
    # proximity_halt_m:  body clearance (m) below which this rover halts.
    # proximity_estop_m: body clearance (m) below which BOTH rovers halt (signal peer via ROS).
    peer_rover_ns:             ''     # set to '/rv2' on RV1, '/rv1' on RV2
    rover_front_corner_dist_m: 0.6
    rover_rear_corner_dist_m:  1.0
    rover_half_width_m:        0.5
    proximity_slow_m:          1.5
    proximity_halt_m:          1.0
    proximity_estop_m:         0.5

    # ── Diagnostic CSV logger ───────────────────────────────────────────────
    # Set enable_diag_log: true to write a per-tick CSV for controller analysis.
    # Copy the file out of the container: docker cp agri_rover_rv1:/tmp/navigator_diag.csv .
    enable_diag_log: false
    diag_log_path:   '/tmp/navigator_diag.csv'
