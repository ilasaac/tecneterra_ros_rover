# ── Rover 2 (Slave) parameters ────────────────────────────────────────────────
# Deploy on: Jetson on slave rover (receives RC via SX1278 → RP2040)
# Node keys must use fully-qualified names (/rv2/<node>) to match namespaced nodes.

/rv2/rp2040_bridge:
  ros__parameters:
    uart_port:          /dev/ttyACM0
    uart_baud:          115200
    heartbeat_interval: 0.2

/rv2/gps_driver:
  ros__parameters:
    primary_port:   /tmp/rv2_gps_pri   # real HW: /dev/ttyUSB0  sim: symlink from nmea_wifi_rx.py
    secondary_port: /tmp/rv2_gps_sec   # real HW: /dev/ttyUSB1  sim: symlink from nmea_wifi_rx.py
    baud:           115200
    publish_rate:   25.0

/rv2/mavlink_bridge:
  ros__parameters:
    rover_id:  2
    gqc_host:  192.168.100.255  # WiFi broadcast — GQC receives regardless of IP
    gqc_port:  14550            # GQC identifies rovers by sysid, not port
    bind_port: 14550            # RV2 listens on :14550 — same as RV1 (different Jetson, no conflict)

/rv2/sensor_node:
  ros__parameters:
    publish_rate: 1.0

/rv2/video_streamer:
  ros__parameters:
    rtsp_port:     8555          # different port from RV1
    mount_point:   /stream
    camera_source: test         # csi | usb | test
    csi_sensor_id: 0
    width:         1280
    height:        720
    framerate:     30
    bitrate:       2000
    flip_method:   0

/rv2/navigator:
  ros__parameters:
    lookahead_distance:        2.0
    default_acceptance_radius: 0.5
    max_speed:                 1.5
    min_speed:                 0.5
    max_steering:              0.8
    control_rate:              25.0   # Hz — must match GPS hardware NMEA output rate
    gps_timeout:               2.0
    heading_deadband:          3.0
    align_threshold:           60.0
    stanley_k:                 0.3
    stanley_softening:         0.3
    stanley_cte_scale_m:       1.0    # CTE (m) at which speed halves (proportional slowdown)
    stanley_cte_alarm_m:       1.5    # CTE (m) above which rover disarms (safety)
    min_turn_radius_m:         3.0    # minimum turn radius for corridor arc turns (metres)
    pivot_threshold:           25.0
    pivot_approach_dist:       2.0
    post_turn_speed:           0.5    # m/s — speed at first point after a corridor turn
    min_pivot_segment_m:       0.3   # min adjacent segment length to qualify for pivot detection
    rover_width_m:             1.0
    obstacle_clearance_m:      0.5
    bypass_arc_radius_m:       0.5    # smoother sample distance in metres (0 = disabled)
    bypass_arc_speed_k:        0.7    # speed scaling: speed = max_speed * (1 - k * angle/180)
    control_algorithm:         stanley
    min_steer_ppm_delta:    300   # min |steer_ppm - 1500| during ALL turns/curves
    steer_coast_angle:       5.0  # below this |heading_err| (°), floor not applied
    mpc_horizon:               5
    mpc_dt:                    0.1
    mpc_w_cte:                 5.0
    mpc_w_heading:             1.0
    mpc_w_steer:               0.1
    mpc_w_dsteer:              0.05
    wheelbase_m:               0.6
    # Inter-rover proximity safety — RV2 monitors RV1
    peer_rover_ns:             '/rv1'
    rover_front_corner_dist_m: 0.6
    rover_rear_corner_dist_m:  1.0
    rover_half_width_m:        0.5
    proximity_slow_m:          1.5
    proximity_halt_m:          0.75
    proximity_estop_m:         0.5
    # Resource management — set GPS coordinates of your field base stations
    recharge_lat:      0.0
    recharge_lon:      0.0
    water_lat:         0.0
    water_lon:         0.0
    battery_low_pct:   15.0
    tank_low_pct:      5.0
    base_speed:        0.9
    base_acceptance_m: 1.5
    enable_diag_log:           true
    diag_log_path:             '/tmp/navigator_diag.csv'

/rv2/sim_harness:
  ros__parameters:
    physics_rate_hz:             25.0
    antenna_baseline_m:          1.0
    arm_delay_s:                 1.0
    shutdown_delay_s:            2.0
    max_speed:                   1.5
    max_steering:                0.8
    wheelbase_m:                 0.6
    track_width_m:               0.9
    max_wheel_mms:               1650.0
    steering_scale:              0.37
    accel_cap_mms_per_tick:      7.0
    decel_divisor:               1.0
    angular_diff_limit_mms:      275.0
    smooth_tick_hz:              100.0
    rotation_center_offset_m:    0.35
    steer_lag_s:                 0.25
