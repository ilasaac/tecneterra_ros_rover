# ── Rover 1 (Master) parameters ───────────────────────────────────────────────
# Deploy on: Jetson connected to HM30 air unit
# Node keys must use fully-qualified names (/rv1/<node>) to match namespaced nodes.

/rv1/rp2040_bridge:
  ros__parameters:
    uart_port:          /dev/rv1_rp2040
    uart_baud:          115200
    heartbeat_interval: 0.2

/rv1/gps_driver:
  ros__parameters:
    primary_port:   /dev/rv1_gps_pri   # udev symlink → rear antenna u-blox (USB port 2.3.3)
    secondary_port: /dev/rv1_gps_sec   # udev symlink → front antenna u-blox (USB port 2.4.3)
    baud:           115200
    # publish_rate: timer rate (Hz); only publishes when new GGA arrives — set to match GPS hw rate
    publish_rate:   25.0

/rv1/sensor_node:
  ros__parameters:
    publish_rate: 1.0

/rv1/video_streamer:
  ros__parameters:
    rtsp_port:     8554
    mount_point:   /stream
    camera_source: test         # csi | usb | test
    csi_sensor_id: 0
    width:         1280
    height:        720
    framerate:     30
    bitrate:       2000
    flip_method:   0

/rv1/navigator:
  ros__parameters:
    lookahead_distance:        2.0
    default_acceptance_radius: 0.5
    max_speed:                 1.5
    min_speed:                 0.5
    max_steering:              0.8
    control_rate:              25.0   # Hz — must match GPS hardware NMEA output rate
    gps_timeout:               2.0
    heading_deadband:          3.0
    align_threshold:           60.0
    stanley_k:                 0.3
    stanley_softening:         0.3
    stanley_cte_scale_m:       1.0    # CTE (m) at which speed halves (proportional slowdown)
    stanley_cte_alarm_m:       1.0    # CTE (m) above which rover disarms (safety)
    min_turn_radius_m:         3.0    # minimum turn radius for corridor arc turns (metres)
    pivot_threshold:           25.0
    pivot_approach_dist:       2.0
    post_turn_speed:           0.5    # m/s — speed at first point after a corridor turn
    min_pivot_segment_m:       0.3   # min adjacent segment length to qualify for pivot detection
    # Lane-tag arc insertion (row<->hd transitions in tagged corridor missions)
    lane_arc_radius_m:         1.0    # tangent-circle radius at row<->hd junctions (m)
    lane_arc_threshold_deg:    15.0   # min heading change to insert an arc (smaller corners pass through)
    rover_width_m:             1.0
    obstacle_clearance_m:      0.5
    bypass_arc_radius_m:       0.5    # smoother sample distance in metres (0 = disabled)
    bypass_arc_speed_k:        0.7    # speed scaling: speed = max_speed * (1 - k * angle/180)
    # Motor stiction floors (Stanley output)
    min_throttle_ppm:       1550   # hard PPM floor for forward motion
    min_steer_ppm_delta:     300   # min |steer_ppm - 1500| during turns/curves
    steer_coast_angle:       5.0   # below this |heading_err| (°), floor not applied
    # Inter-rover proximity safety — RV1 monitors RV2
    peer_rover_ns:             '/rv2'
    rover_front_corner_dist_m: 0.6    # diagonal from front antenna to front corner
    rover_rear_corner_dist_m:  1.0    # diagonal from rear antenna to rear corner
    rover_half_width_m:        0.5    # half the rover body width
    proximity_slow_m:          1.5    # half-speed when body clearance < 1.5 m
    proximity_halt_m:          0.75   # halt when body clearance < 0.75 m
    proximity_estop_m:         0.5    # e-stop both rovers when clearance < 0.5 m
    # Resource management — set GPS coordinates of your field base stations
    recharge_lat:      0.0    # battery recharge station latitude  (set for your field)
    recharge_lon:      0.0    # battery recharge station longitude
    water_lat:         0.0    # water refill station latitude
    water_lon:         0.0    # water refill station longitude
    battery_low_pct:   15.0   # trigger base return when battery below this % (0–100)
    tank_low_pct:      5.0    # trigger base return when tank below this % (0–100)
    base_speed:        0.9    # speed for base trip navigation (m/s)
    base_acceptance_m: 1.5    # arrival radius at base station (metres)
    enable_diag_log:           true
    diag_log_path:             '/tmp/navigator_diag.csv'

/rv1/sim_harness:
  ros__parameters:
    physics_rate_hz:             25.0
    antenna_baseline_m:          1.0
    arm_delay_s:                 1.0
    shutdown_delay_s:            2.0
    # Must match navigator params for consistent physics
    max_speed:                   1.5
    max_steering:                0.8
    wheelbase_m:                 0.6
    # DiffDriveState physics (tuned from real rover dynamics)
    track_width_m:               0.9
    max_wheel_mms:               1650.0
    steering_scale:              0.37
    accel_cap_mms_per_tick:      7.0
    decel_divisor:               1.0
    angular_diff_limit_mms:      275.0
    smooth_tick_hz:              100.0
    rotation_center_offset_m:    0.35
    steer_lag_s:                 0.25
