# ── Rover 1 (Master) parameters ───────────────────────────────────────────────
# Deploy on: Jetson connected to HM30 air unit
# Node keys must use fully-qualified names (/rv1/<node>) to match namespaced nodes.

/rv1/rp2040_bridge:
  ros__parameters:
    uart_port:          /dev/rv1_rp2040
    uart_baud:          115200
    heartbeat_interval: 0.2

/rv1/gps_driver:
  ros__parameters:
    primary_port:   /dev/rv1_gps_pri   # udev symlink → rear antenna u-blox (USB port 2.3.3)
    secondary_port: /dev/rv1_gps_sec   # udev symlink → front antenna u-blox (USB port 2.4.3)
    baud:           115200
    # publish_rate: timer rate (Hz); only publishes when new GGA arrives — set to match GPS hw rate
    publish_rate:   25.0

/rv1/mavlink_bridge:
  ros__parameters:
    rover_id:  1
    gqc_host:  192.168.100.255  # WiFi broadcast — GQC receives regardless of IP
    gqc_port:  14550
    bind_port: 14550            # listen on :14550 for inbound MAVLink from GQC
    # Resource management — set GPS coordinates of your field base stations
    recharge_lat:      0.0    # battery recharge station latitude  (set for your field)
    recharge_lon:      0.0    # battery recharge station longitude
    water_lat:         0.0    # water refill station latitude
    water_lon:         0.0    # water refill station longitude
    battery_low_pct:   15.0  # trigger base return when battery below this % (0–100)
    tank_low_frac:     0.05  # trigger base return when tank below this fraction (0–1)
    base_acceptance_m: 1.5   # arrival radius at base station (metres)

/rv1/sensor_node:
  ros__parameters:
    publish_rate: 1.0

/rv1/video_streamer:
  ros__parameters:
    rtsp_port:     8554
    mount_point:   /stream
    camera_source: test         # csi | usb | test
    csi_sensor_id: 0
    width:         1280
    height:        720
    framerate:     30
    bitrate:       2000
    flip_method:   0

/rv1/navigator:
  ros__parameters:
    lookahead_distance:        2.0
    default_acceptance_radius: 0.5
    max_speed:                 1.5
    min_speed:                 0.6
    max_steering:              0.8
    control_rate:              25.0   # Hz — must match GPS hardware NMEA output rate
    gps_timeout:               2.0
    heading_deadband:          3.0
    align_threshold:           60.0
    stanley_k:                 0.3
    stanley_softening:         0.3
    pivot_threshold:           25.0
    pivot_approach_dist:       2.0
    min_pivot_segment_m:       0.3   # min adjacent segment length to qualify for pivot detection
    rover_width_m:             1.0
    obstacle_clearance_m:      0.5
    control_algorithm:         stanley   # stanley | mpc | ttr | afs
    # AFS (Always Forward Strategy) parameters — only used when control_algorithm: afs
    # afs_cte_scale_m:    CTE (m) at which throttle reaches min_speed (linear decay)
    # afs_cte_alarm_m:    CTE (m) above which the rover halts and logs a critical alarm
    # afs_approach_dist_m: rover switches to direct-to-wp approach within this distance
    #                      of a turn waypoint; continues until closest approach is passed,
    #                      then stops and spins to the outgoing bearing.
    afs_cte_scale_m:           2.0
    afs_cte_alarm_m:           3.0
    afs_approach_dist_m:       5.0
    afs_min_throttle_ppm:      1550   # hard PPM floor for forward motion (tune to motor stiction)
    min_steer_ppm_delta:    300   # min |steer_ppm - 1500| during ALL turns/curves (tune to motor stiction)
    steer_coast_angle:       5.0  # below this |heading_err| (°), floor not applied — coast to zero near target
    # TTR dual-PID (CTE → heading cascaded controller)
    ttr_angle_kp:              3.0
    ttr_angle_ki:              0.0
    ttr_angle_kd:              0.1
    ttr_hight_kp:              1.5
    ttr_hight_ki:              0.0
    ttr_hight_kd:              0.0
    ttr_max_yaw_distance:      3.0
    ttr_target_dece_dis:       4.0
    # MPC parameters (alternative algorithm)
    mpc_horizon:               5
    mpc_dt:                    0.1
    mpc_w_cte:                 5.0
    mpc_w_heading:             1.0
    mpc_w_steer:               0.1
    mpc_w_dsteer:              0.05
    wheelbase_m:               0.6
    # Inter-rover proximity safety — RV1 monitors RV2
    peer_rover_ns:             '/rv2'
    rover_front_corner_dist_m: 0.6    # diagonal from front antenna to front corner
    rover_rear_corner_dist_m:  1.0    # diagonal from rear antenna to rear corner
    rover_half_width_m:        0.5    # half the rover body width
    proximity_slow_m:          1.5    # half-speed when body clearance < 1.5 m
    proximity_halt_m:          1.0    # halt when body clearance < 1.0 m
    proximity_estop_m:         0.5    # e-stop both rovers when clearance < 0.5 m
    enable_diag_log:           true
    diag_log_path:             '/tmp/navigator_diag.csv'
