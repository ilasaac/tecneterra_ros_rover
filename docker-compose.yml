# AgriRover — Docker Compose
#
# Usage:
#   Rover 1 (master Jetson):  docker compose up rover1
#   Rover 2 (slave Jetson):   docker compose up rover2
#
# Override camera source:
#   docker compose run rover1 ros2 launch agri_rover_bringup rover1.launch.py camera_source:=usb

x-rover-base: &rover-base
  image: agri_rover:latest
  build:
    context: .
    dockerfile: Dockerfile
  privileged: true          # required for GPIO, USB serial, CSI camera
  user: root                # needed for PTY access (sim GPS) and device permissions
  network_mode: host        # MAVLink UDP broadcast + ROS2 DDS multicast
  runtime: nvidia           # enable Jetson GPU (NITROS, nvarguscamerasrc)
  environment:
    - NVIDIA_VISIBLE_DEVICES=all
    - NVIDIA_DRIVER_CAPABILITIES=all,graphics
    - ROS_DOMAIN_ID=0
  volumes:
    - /dev:/dev             # serial ports, video devices (incl. /dev/pts PTY slaves)
    - /tmp:/tmp             # PTY symlinks from nmea_wifi_rx.py + argus socket
    - ./ros2_ws/src:/workspaces/isaac_ros-dev/src  # live Python nodes — no rebuild needed
    - ./tools:/workspaces/isaac_ros-dev/tools      # sim tools (nmea_wifi_rx.py etc.)
    - ./ros2_ws/src/agri_rover_bringup/config:/workspaces/isaac_ros-dev/install/agri_rover_bringup/share/agri_rover_bringup/config  # live params YAML
  restart: unless-stopped

services:
  rover1:
    <<: *rover-base
    container_name: agri_rover_rv1
    command: ros2 launch agri_rover_bringup rover1.launch.py camera_source:=${CAMERA_SOURCE:-csi}

  rover2:
    <<: *rover-base
    container_name: agri_rover_rv2
    command: ros2 launch agri_rover_bringup rover2.launch.py camera_source:=${CAMERA_SOURCE:-csi}
